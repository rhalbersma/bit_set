name: Clang-CL

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # clang-cl: Clang's MSVC-compatible driver, using the MSVC STL and linker
    # rather than libc++. Exercises Clang's diagnostics (this repo builds
    # with -Weverything -Werror under Clang) against the same code MSVC
    # builds. No VS 2022 leg: clang-cl uses the MSVC STL regardless of
    # front-end compiler, and VS 2022's MSVC STL doesn't have <flat_set>
    # yet (benchmark/src/set/sieve.cpp depends on it) - same reason
    # msvc.yml only tests VS 2026.
    name: Clang-CL VS ${{ matrix.vs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - vs: 2026
            os: windows-2025
            generator: "Visual Studio 18 2026"
            toolset: "ClangCL,host=x64"
            arch: x64
            triplet: x64-windows

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Export the two env vars vcpkg's "x-gha" binary source needs to talk
      # to the GitHub Actions cache service, so built packages are reused
      # across runs instead of recompiled from scratch every time.
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install dependencies
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: vcpkg install --triplet ${{ matrix.triplet }}

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "${{ matrix.generator }}" -A ${{ matrix.arch }}
          -T ${{ matrix.toolset }}
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -v

      - name: Test
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure
