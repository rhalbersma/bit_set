name: GCC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: GCC ${{ matrix.label }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "15"
            version: 15
            trunk: false
          - label: "16"
            version: 16
            trunk: false
          - label: 17-SVN
            version: 17
            trunk: true

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # bit_set/bit/array.hpp uses std::ranges::shift_left/shift_right
      # (P2440R1), which the runner image's default GCC 13 does not yet
      # implement in libstdc++ - confirmed by direct compilation while
      # scoping this workflow. GCC 15+ is the floor being tested here; if
      # this leg fails on 15 too, the floor needs to move to 16 or trunk.
      - name: Install GCC ${{ matrix.version }} (stable)
        if: "!matrix.trunk"
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-${{ matrix.version }}

      # Installs Jonathan Wakely's binary snapshot of GCC trunk (see
      # https://jwakely.github.io/pkg-gcc-latest/). Not an official GCC
      # release, but this leg is required like any other: it's expected to
      # go red when trunk changes something bit_set needs to adapt to,
      # rather than that being missed until the next stable release.
      - name: Install GCC trunk snapshot
        if: matrix.trunk
        run: |
          wget -q https://kayari.org/gcc-latest/gcc-latest.deb -O gcc-latest.deb
          sudo dpkg -i gcc-latest.deb || sudo apt-get install -f -y
          sudo ln -sf /opt/gcc-latest/bin/gcc /usr/bin/gcc-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/g++ /usr/bin/g++-${{ matrix.version }}
          printf '%s\n' \
            '# Multiarch support' \
            /opt/gcc-latest/lib \
            /opt/gcc-latest/lib64 | sudo tee /etc/ld.so.conf.d/gcc-latest.conf > /dev/null
          sudo ldconfig
          gcc-${{ matrix.version }} --version
          g++-${{ matrix.version }} --version

      # Export the two env vars vcpkg's "x-gha" binary source needs to talk
      # to the GitHub Actions cache service, so built packages are reused
      # across runs instead of recompiled from scratch every time. Not
      # used by the trunk leg - see "Install dependencies (trunk)" below.
      - name: Export GitHub Actions cache environment variables
        if: "!matrix.trunk"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # vcpkg.json's "test" feature (on by default) pulls in everything the
      # unit tests and benchmarks need: boost-hash2, boost-test,
      # boost-dynamic-bitset, fmt, benchmark and range-v3. All apt-installed
      # GCCs share the system libstdc++, so ABI is consistent regardless of
      # which one built vcpkg's packages.
      - name: Install dependencies (stable)
        if: "!matrix.trunk"
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: vcpkg install --triplet x64-linux

      # The trunk snapshot bundles its own private libstdc++ rather than
      # sharing the system one (unlike every apt-installed GCC), so
      # vcpkg's ordinary prebuilt binaries - built against the system
      # libstdc++ - won't link against it. The x64-linux-gcc-trunk overlay
      # triplet rebuilds every dependency from source with the same
      # compiler instead; not cached via x-gha, since a trunk snapshot
      # changes too often for that cache to usefully hit.
      - name: Install dependencies (trunk)
        if: matrix.trunk
        run: >
          vcpkg install
          --triplet x64-linux-gcc-trunk
          --overlay-triplets "$GITHUB_WORKSPACE/.github/vcpkg/triplets"

      - name: Configure (stable)
        if: "!matrix.trunk"
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=gcc-${{ matrix.version }}
          -DCMAKE_CXX_COMPILER=g++-${{ matrix.version }}
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Configure (trunk)
        if: matrix.trunk
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=gcc-${{ matrix.version }}
          -DCMAKE_CXX_COMPILER=g++-${{ matrix.version }}
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-linux-gcc-trunk
          -DVCPKG_OVERLAY_TRIPLETS=$GITHUB_WORKSPACE/.github/vcpkg/triplets

      - name: Build
        run: cmake --build build -v

      - name: Test
        run: ctest --test-dir build --output-on-failure
