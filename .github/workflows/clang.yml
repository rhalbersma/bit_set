name: Clang

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Clang ${{ matrix.label }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "21"
            version: 21
            stdlib: libstdc++
            triplet: x64-linux
            cxxflags: ""
          - label: "22"
            version: 22
            stdlib: libstdc++
            triplet: x64-linux
            cxxflags: ""
          # apt.llvm.org's "23" package tracks LLVM's in-development next
          # major, same as the libc++ leg below, but paired with libstdc++
          # instead - this is the regular required leg (same as 21/22),
          # just one version further ahead, so a trunk-Clang/libstdc++
          # regression shows up here independently of the libc++ gaps the
          # leg below is tracking.
          - label: "23-SVN"
            version: 23
            stdlib: libstdc++
            triplet: x64-linux
            cxxflags: ""
          # Tracks libc++ trunk deliberately: bit_set currently uses several
          # C++23 range adaptors (views::cartesian_product, views::adjacent,
          # views::pairwise_transform, views::stride) libc++ hasn't
          # implemented yet, unlike libstdc++ - too many to work around with
          # portable rewrites the way the AppleClang legs' fixes did for a
          # couple of them. This leg is intentionally NOT a required status
          # check (configured in the repo's branch protection settings, not
          # expressible here) - it's expected to stay red until upstream
          # catches up, and exists so this goes green (and starts actually
          # blocking regressions) the moment it does, rather than that
          # being missed. apt.llvm.org's "23" package tracks LLVM's
          # in-development next major, so this moves as trunk moves.
          - label: 23-SVN libc++
            version: 23
            stdlib: libc++
            triplet: x64-linux-libcxx
            cxxflags: "-stdlib=libc++"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Clang ${{ matrix.version }}
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ matrix.version }}

      - name: Install libc++ ${{ matrix.version }}
        if: matrix.stdlib == 'libc++'
        run: sudo apt-get install -y libc++-${{ matrix.version }}-dev libc++abi-${{ matrix.version }}-dev

      # apt.llvm.org's Clang packages link against the system libstdc++
      # like every other apt-installed compiler on the runner (see the
      # "Install dependencies" comment below) - they don't bundle their
      # own C++ standard library. ubuntu-24.04's default system GCC is 13,
      # whose libstdc++ predates <flat_set> (added in GCC 15's libstdc++,
      # same C++23-stdlib floor gcc.yml already tests against). Installing
      # g++-15 makes its libstdc++ headers available too - Clang auto-
      # detects and uses the highest-versioned GCC installation it finds,
      # so no extra --gcc-toolchain flag is needed once this is present.
      # Not needed for the libc++ leg, which doesn't touch libstdc++ at all.
      - name: Install GCC 15 (for its libstdc++, not as the compiler)
        if: matrix.stdlib == 'libstdc++'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15

      # Export the two env vars vcpkg's "x-gha" binary source needs to talk
      # to the GitHub Actions cache service, so built packages are reused
      # across runs instead of recompiled from scratch every time.
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # vcpkg.json's "test" feature (on by default) pulls in everything the
      # unit tests and benchmarks need: boost-hash2, boost-test,
      # boost-dynamic-bitset, fmt, benchmark and range-v3. apt.llvm.org's
      # Clang packages link against the system libstdc++ like every other
      # apt-installed compiler on the runner, so there's no ABI mismatch
      # with vcpkg's prebuilt packages. The libc++ leg instead selects the
      # overlay triplet, which rebuilds these against libc++ (a libstdc++
      # Boost.Test would not link).
      - name: Install dependencies
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: >
          vcpkg install
          --triplet ${{ matrix.triplet }}
          --overlay-triplets "$GITHUB_WORKSPACE/.github/vcpkg/triplets"

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_C_COMPILER=clang-${{ matrix.version }}
          -DCMAKE_CXX_COMPILER=clang++-${{ matrix.version }}
          "-DCMAKE_CXX_FLAGS=${{ matrix.cxxflags }}"
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          -DVCPKG_OVERLAY_TRIPLETS=$GITHUB_WORKSPACE/.github/vcpkg/triplets

      - name: Build
        run: cmake --build build -v

      - name: Test
        run: ctest --test-dir build --output-on-failure
